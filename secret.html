<!-- GIFT OPEN SCRIPT -->

<script>

/* FIRST GIFT */

const gift1 =
document.getElementById("giftImage1");

gift1.onclick = function(){

  if(gift1.src.includes("green.jpeg")){

    gift1.src = "rose.jpeg";

    gift1.style.width = "420px";

  }

  else{

    gift1.src = "green.jpeg";

    gift1.style.width = "320px";

  }
}

/* SECOND GIFT */

const gift2 =
document.getElementById("giftImage2");

gift2.onclick = function(){

  if(gift2.src.includes("silver.jpeg")){

    gift2.src = "sketch.jpeg";

    gift2.style.width = "420px";

  }

  else{

    gift2.src = "silver.jpeg";

    gift2.style.width = "320px";

  }
}

</script>

<!-- FIREWORKS SCRIPT -->

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>

<script>

const container = document.getElementById('fireworks-container');

const fireworks = new Fireworks.default(container, {

  rocketsPoint: {
    min: 50,
    max: 50
  },

  hue: {
    min: 0,
    max: 360
  },

  delay: {
    min: 15,
    max: 30
  },

  speed: 2,

  acceleration: 1.05,

  friction: 0.95,

  gravity: 1.5,

  particles: 120,

  trace: 3,

  explosion: 5,

  autoresize: true,

  brightness: {
    min: 50,
    max: 80
  }

});

fireworks.start();

</script>
<script>

function openLetter(fileName, correctPassword){

  let enteredPassword =
  prompt("Enter password 👀");

  if(
    enteredPassword === correctPassword
  ){

    window.open(fileName, "_blank");

  }

  else{

    alert("Wrong Password 😭");

  }

}

</script>
